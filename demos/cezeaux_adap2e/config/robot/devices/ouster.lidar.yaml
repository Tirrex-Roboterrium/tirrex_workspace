name: lidar3d
driver:
  package: ouster_ros
  executable: none  #  use launch file instead
  parameters:  # you can directly give the parameters of the ouster params_file
    sensor_hostname: 192.168.0.25
    # proc_mask: IMU|PCL|SCAN|IMG|RAW|TLM  # if you want to enable all topics
    
    # timestamp_mode[optional]: method used to timestamp measurements; possible
    # "values":
    # - TIME_FROM_INTERNAL_OSC
    # - TIME_FROM_SYNC_PULSE_IN
    # - TIME_FROM_PTP_1588
    # - "TIME_FROM_ROS_TIME": This option uses the time of reception of first
    #                       packet of a LidarScan as the timestamp of the IMU,
    #                       PointCloud2 and LaserScan messages.
    timestamp_mode: TIME_FROM_ROS_TIME
configuration:
  type: ouster
  model: os1_32
  rate: 10  # unit: Hz, available: [5, 10, 20]
  resolution: 0.3515625  # unit: °, available: [0.703125, 0.3515625, 0.17578125, 0.087890625]
geometry:
  parent_link: base_link
  xyz: [2.50, 0.0, 0.4]
  rpy: [0.0, 0.0, 0.0]
records:
  scan: false
  points: true
